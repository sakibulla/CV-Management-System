version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=CVManagementSystem;Username=cvms_user;Password=cvms_password_123
    depends_on:
      - postgres
    networks:
      - cvms-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=CVManagementSystem
      - POSTGRES_USER=cvms_user
      - POSTGRES_PASSWORD=cvms_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cvms-network

volumes:
  postgres-data:

networks:
  cvms-network:
    driver: bridge
