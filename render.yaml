services:
  - type: web
    name: cv-management-system
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: cvms-db
          property: connectionString
    healthCheckPath: /

databases:
  - name: cvms-db
    databaseName: cvmanagement
    plan: free
